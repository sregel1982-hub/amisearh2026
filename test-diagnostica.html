<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Diagnosztika Teszt</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; }
    button { padding: 12px 20px; font-size: 16px; background: #4CAF50; color: white; border: none; border-radius: 6px; cursor: pointer; }
    pre { background: #f4f4f4; padding: 15px; border-radius: 6px; overflow: auto; margin-top: 20px; }
  </style>
</head>
<body>
  <h1>Embedding + Supabase Diagnosztika</h1>
  <button onclick="runTest()">🚀 Diagnózis futtatása</button>
  <pre id="result">Kattints a gombra...</pre>

  <script>
    async function runTest() {
      const resultDiv = document.getElementById("result");
      resultDiv.textContent = "Teszt fut...";

      try {
        const res = await fetch("/.netlify/functions/test-embedding", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({})
        });

        const data = await res.json();
        resultDiv.textContent = JSON.stringify(data, null, 2);
      } catch (err) {
        resultDiv.textContent = "Hiba: " + err.message;
      }
    }
  </script>
</body>
</html>
