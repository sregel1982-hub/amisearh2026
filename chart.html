<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Diagram - AMISEARCH</title>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body {
      font-family: system-ui;
      max-width: 1000px;
      margin: 0 auto;
      padding: 20px;
      background: #f5f5f5;
    }
    .card {
      background: white;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    }
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 25px;
      flex-wrap: wrap;
      gap: 10px;
    }
    button {
      background: #6366f1;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 16px;
    }
    button:hover { background: #4f52cc; }
    .explanation {
      margin-top: 25px;
      padding: 20px;
      background: #f3f4f6;
      border-radius: 8px;
      border-left: 5px solid #6366f1;
    }
    canvas { max-width: 100%; }
  </style>
</head>

<body>
  <div class="card">
    <div class="header">
      <h1>📊 Diagram</h1>

      <!-- JAVÍTOTT VISSZA GOMB -->
      <button onclick="window.location.href='https://amisearch.org'">← Vissza a chathez</button>
    </div>

    <div id="loading">Betöltés...</div>

    <div id="content" style="display:none;">
      <h3 id="question"></h3>
      <canvas id="chartCanvas"></canvas>

      <div class="explanation">
        <strong>Magyarázat:</strong>
        <p id="explanationText"></p>
      </div>
    </div>
  </div>

<script>
  const SUPABASE_URL = 'https://rvgzvseejzbzmcqidnzc.supabase.co';
  const SUPABASE_ANON_KEY = 'sb_publishable_OFOpS0WMB4Sy0ciyIA9ySQ_59JH7Njh';
  const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  async function init() {
    try {
      // SESSION-BIZTOSÍTÁS
      const { data: { session } } = await supabase.auth.getSession();

      if (!session) {
        // NEM DOB VISSZA, CSAK KIÍRJA
        document.getElementById('loading').innerHTML =
          '<strong>Hiba:</strong> Nincs bejelentkezve. Jelentkezz be az AMISEARCH főoldalán.';
        return;
      }

      const urlParams = new URLSearchParams(window.location.search);
      const id = urlParams.get('id');

      if (!id) {
        document.getElementById('loading').innerHTML =
          '<strong>Hiba:</strong> Hiányzó diagram ID.';
        return;
      }

      const { data, error } = await supabase
        .from('charts')
        .select('*')
        .eq('id', id)
        .single();

      if (error || !data) {
        document.getElementById('loading').innerHTML =
          `<strong>Hiba:</strong> Diagram nem található (${error?.message || 'ismeretlen hiba'})`;
        return;
      }

      // SIKERES BETÖLTÉS
      document.getElementById('loading').style.display = 'none';
      document.getElementById('content').style.display = 'block';

      document.getElementById('question').textContent = data.question || 'Diagram';
      document.getElementById('explanationText').textContent = data.explanation || 'Nincs magyarázat.';

      // CHART RENDER
      const ctx = document.getElementById('chartCanvas');
      new Chart(ctx, data.config);

    } catch (err) {
      console.error(err);
      document.getElementById('loading').innerHTML =
        'Hiba történt a diagram betöltése közben.';
    }
  }

  window.onload = init;
</script>

</body>
</html>
