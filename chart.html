<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Diagram - AMISEARCH</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body { font-family: system-ui; background: #f5f5f5; margin: 0; padding: 20px; }
    .card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); max-width: 1000px; margin: 0 auto; }
    button { background: #6366f1; color: white; border: none; padding: 12px 24px; border-radius: 8px; cursor: pointer; }
    .loading { text-align: center; padding: 60px; font-size: 18px; }
  </style>
</head>
<body>
  <div class="card">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
      <h1>📊 Diagram Generálás</h1>
      <button onclick="window.location.href='https://amisearch.org'">← Vissza a chathez</button>
    </div>

    <div id="loading" class="loading">Diagram generálása...</div>
    <div id="content" style="display:none;">
      <h3 id="question"></h3>
      <canvas id="chartCanvas" style="max-width:100%;"></canvas>
      <div class="explanation" style="margin-top:25px; padding:20px; background:#f3f4f6; border-radius:8px;">
        <strong>Magyarázat:</strong>
        <p id="explanationText"></p>
      </div>
    </div>
  </div>

<script>
  const supabase = window.supabase.createClient(
    'https://rvgzvseejzbzmcqidnzc.supabase.co',
    'sb_publishable_OFOpS0WMB4Sy0ciyIA9ySQ_59JH7Njh'
  );

  async function init() {
    const params = new URLSearchParams(window.location.search);
    const id = params.get('id');
    const auto = params.get('auto');
    const question = params.get('question');
    const explanation = params.get('explanation');

    if (auto === 'true' && question) {
      // Auto mód: itt majd később generálhatnál Chart.js configot backendről
      document.getElementById('loading').innerHTML = `
        <p><strong>${question}</strong></p>
        <p>Automatikus diagram generálás folyamatban...</p>
      `;
      // Itt később hívhatsz egy generate-chart funkciót
      return;
    }

    if (id) {
      // Meglévő diagram betöltése
      const { data, error } = await supabase.from('charts').select('*').eq('id', id).single();
      if (error || !data) {
        document.getElementById('loading').innerHTML = 'Diagram nem található.';
        return;
      }

      document.getElementById('loading').style.display = 'none';
      document.getElementById('content').style.display = 'block';

      document.getElementById('question').textContent = data.question;
      document.getElementById('explanationText').textContent = data.explanation || '';

      new Chart(document.getElementById('chartCanvas'), data.config);
    }
  }

  window.onload = init;
</script>
</body>
</html>
