<!-- Árak Section – FRISSÍTVE -->
<section id="arak" class="py-20 bg-gray-50">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="text-center mb-16">
      <span class="px-4 py-2 bg-purple-100 text-[#6C5CE7] rounded-full text-sm font-bold">Árak</span>
      <h2 class="text-4xl md:text-5xl font-extrabold mt-6 mb-4" data-hu="Válassz csomagot" data-en="Choose your plan">Válassz csomagot</h2>
      <p class="text-xl text-gray-600" data-hu="Kezdd ingyen, frissíts amikor készen állsz" data-en="Start free, upgrade when you're ready">Kezdd ingyen, frissíts amikor készen állsz</p>
    </div>

    <div class="grid md:grid-cols-3 gap-8 max-w-6xl mx-auto">
      <!-- Free -->
      <div class="bg-white rounded-2xl p-8 shadow-lg hover-lift border-2 border-gray-100">
        <h3 class="text-2xl font-bold mb-2" data-hu="Ingyenes" data-en="Free">Ingyenes</h3>
        <p class="text-gray-600 mb-6" data-hu="Próbáld ki alapfunkciókkal" data-en="Try the basics">Próbáld ki alapfunkciókkal</p>
        <div class="mb-6">
          <span class="text-5xl font-extrabold">0 Ft / $0</span>
        </div>
        <button onclick="openModal('registerModal')" class="w-full py-3 bg-gray-100 hover:bg-gray-200 text-gray-900 font-bold rounded-xl transition mb-8">Kezdd el</button>
        <ul class="space-y-3 text-sm">
          <li class="flex items-start"><i class="fa-solid fa-check text-green-500 mr-3 mt-1"></i><span data-hu="30 AI kérdés" data-en="30 AI questions">30 AI kérdés</span></li>
          <!-- többi lista változatlan -->
        </ul>
      </div>

      <!-- Pro 1 hónap -->
      <div class="bg-white rounded-2xl p-8 shadow-lg hover-lift border-2 border-purple-200">
        <h3 class="text-2xl font-bold mb-2" data-hu="Pro – 1 hónap" data-en="Pro – 1 month">Pro – 1 hónap</h3>
        <p class="text-gray-600 mb-6" data-hu="Komoly tanuláshoz" data-en="For serious learners">Komoly tanuláshoz</p>
        <div class="mb-6" id="price-1m">
          <span class="text-5xl font-extrabold">2 100 Ft</span>
          <span class="text-gray-600">/hó</span>
        </div>
        <button id="buy-1m" class="w-full py-3 bg-[#6C5CE7] hover:bg-[#5A4BD1] text-white font-bold rounded-xl transition mb-8">Vásárlás</button>
        <!-- lista változatlan -->
      </div>

      <!-- Pro 6 hónap -->
      <div class="bg-gradient-to-br from-[#6C5CE7] to-[#5A4BD1] rounded-2xl p-8 shadow-2xl hover-lift border-2 border-[#6C5CE7] relative transform scale-105">
        <div class="absolute -top-4 left-1/2 -translate-x-1/2 px-4 py-1 bg-yellow-400 text-gray-900 rounded-full text-sm font-bold">Legnépszerűbb</div>
        <h3 class="text-2xl font-bold mb-2 text-white" data-hu="Pro – 6 hónap" data-en="Pro – 6 months">Pro – 6 hónap</h3>
        <p class="text-purple-100 mb-6" data-hu="Hosszú távra a legjobb" data-en="Best long-term value">Hosszú távra a legjobb</p>
        <div class="mb-6" id="price-6m">
          <span class="text-5xl font-extrabold text-white">11 000 Ft</span>
          <span class="text-purple-100">/6 hó</span>
        </div>
        <button id="buy-6m" class="w-full py-3 bg-white hover:bg-gray-100 text-[#6C5CE7] font-bold rounded-xl transition mb-8">Vásárlás</button>
        <!-- lista változatlan -->
      </div>
    </div>
  </div>
</section>

<!-- ... a többi rész (dashboard, modals stb.) változatlan ... -->

<script>
  /* ... összes korábbi script ... */

  // === LEMON SQUEEZY NYELVFÜGGŐ CHECKOUT ===
  const checkoutLinks = {
    pro_1month: {
      hu: "https://amisearch.lemonsqueezy.com/checkout/buy/224a251a-47f7-4f78-93d0-2003eeccd998",
      en: "https://amisearch.lemonsqueezy.com/checkout/buy/77fe885d-b918-452b-94c1-18ad5d3683fb"
    },
    pro_6month: {
      hu: "https://amisearch.lemonsqueezy.com/checkout/buy/69367681-dea8-4881-914e-e72219b35b91",
      en: "https://amisearch.lemonsqueezy.com/checkout/buy/5df5a828-b0ed-411d-9fef-db2fb4449edb"
    }
  };

  function getCurrentLang() {
    return (window.currentLang || localStorage.getItem('lang') || 'hu') === 'hu' ? 'hu' : 'en';
  }

  // Árak frissítése nyelv szerint
  function updatePricingDisplay() {
    const isHu = getCurrentLang() === 'hu';
    
    const p1 = document.getElementById('price-1m');
    if (p1) {
      p1.innerHTML = isHu 
        ? `<span class="text-5xl font-extrabold">2 100 Ft</span><span class="text-gray-600">/hó</span>`
        : `<span class="text-5xl font-extrabold">$7</span><span class="text-gray-600">/month</span>`;
    }

    const p6 = document.getElementById('price-6m');
    if (p6) {
      p6.innerHTML = isHu 
        ? `<span class="text-5xl font-extrabold text-white">11 000 Ft</span><span class="text-purple-100">/6 hó</span>`
        : `<span class="text-5xl font-extrabold text-white">$35</span><span class="text-purple-100">/6 months</span>`;
    }
  }

  // Checkout
  window.startCheckout = function(variantKey) {
    const lang = getCurrentLang();
    const key = variantKey || 'pro_1month';
    if (checkoutLinks[key]) {
      window.location.href = checkoutLinks[key][lang];
    }
  };

  // Inicializálás
  window.addEventListener('load', updatePricingDisplay);

  // Nyelv váltáskor frissítés
  const originalToggleLang = window.toggleLang;
  window.toggleLang = function() {
    if (originalToggleLang) originalToggleLang();
    setTimeout(updatePricingDisplay, 100);
  };

  /* ... a többi script változatlan ... */
</script>

</body>
</html>
