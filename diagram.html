<div class="max-w-4xl mx-auto p-6 bg-white shadow-xl rounded-2xl">
  <h2 class="text-2xl font-bold mb-6 text-gray-800">Függvény Beállítások</h2>
  
  <div class="grid md:grid-cols-2 gap-8">
    <div class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-gray-700">Matematikai Formula (f(x) = ...)</label>
        <input type="text" id="funcInput" value="Math.sin(x) * Math.cos(x/2)" 
               class="w-full mt-1 p-2 border border-gray-300 rounded-lg font-mono">
      </div>
      <div class="flex gap-4">
        <input type="number" id="xMin" value="-10" class="w-full p-2 border rounded-lg" placeholder="X Min">
        <input type="number" id="xMax" value="10" class="w-full p-2 border rounded-lg" placeholder="X Max">
      </div>
      <button onclick="updateChart()" class="w-full bg-indigo-600 text-white py-2 rounded-lg hover:bg-indigo-700">
        Ábrázolás frissítése
      </button>
    </div>

    <div>
      <canvas id="funcCanvas"></canvas>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
  let chart;
  function updateChart() {
    const ctx = document.getElementById('funcCanvas').getContext('2d');
    const formula = document.getElementById('funcInput').value;
    const min = parseInt(document.getElementById('xMin').value);
    const max = parseInt(document.getElementById('xMax').value);

    const labels = [];
    const data = [];
    for (let x = min; x <= max; x += 0.1) {
      labels.push(x.toFixed(1));
      data.push(eval(formula.replace(/x/g, x)));
    }

    if (chart) chart.destroy();
    chart = new Chart(ctx, {
      type: 'line',
      data: { labels: labels, datasets: [{ label: 'f(x)', data: data, borderColor: '#6366f1', fill: false }] },
      options: { responsive: true, elements: { point: { radius: 0 } } }
    });
  }
  updateChart(); // Első betöltés
</script>
