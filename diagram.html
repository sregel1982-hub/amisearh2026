<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AMISEARCH - Gondolattérkép</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/markmap-toolbar@0.17.0/dist/style.min.css">
    <script src="https://cdn.jsdelivr.net/npm/markmap-autoloader@0.17.0"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0f172a; color: #e2e8f0; font-family: 'Segoe UI', sans-serif; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        .tab-content { display: none; }
        .active-tab { display: block; }
        #markmap { width: 100%; height: 60vh; }
        .btn-mystic { transition: all 0.3s ease; border: 1px solid #4f46e5; }
        .btn-mystic:hover { background: #4f46e5; box-shadow: 0 0 15px #4f46e5; }
    </style>
</head>
<body class="p-6">

    <div class="max-w-6xl mx-auto">
        <!-- Fejléc és navigáció -->
        <header class="flex justify-between items-center mb-8">
            <h1 class="text-3xl font-bold tracking-widest text-indigo-400">AMISEARCH</h1>
            <div class="flex gap-4">
                <button onclick="switchTab('mindmap')" class="px-6 py-2 rounded-full glass btn-mystic">Gondolattérkép</button>
                <button onclick="switchTab('quiz')" class="px-6 py-2 rounded-full glass btn-mystic">AI Kvízgenerátor</button>
            </div>
        </header>

        <!-- Gondolattérkép Tab -->
        <div id="mindmap" class="tab-content active-tab glass p-8 rounded-2xl shadow-2xl">
            <input type="text" id="search-box" class="w-full p-4 bg-slate-900 border border-slate-700 rounded-xl mb-6 text-white placeholder-slate-500" placeholder="Írd be a keresendő szimbólumot vagy témát...">
            <svg id="markmap"></svg>
        </div>

        <!-- Kvíz Tab -->
        <div id="quiz" class="tab-content glass p-8 rounded-2xl shadow-2xl">
            <h2 class="text-2xl font-semibold mb-6">Kvíz beállítások</h2>
            <div class="flex gap-4 mb-8">
                <select id="diff" class="p-3 bg-slate-900 rounded-lg border border-slate-700"><option>Könnyű</option><option>Közepes</option><option>Nehéz</option></select>
                <select id="count" class="p-3 bg-slate-900 rounded-lg border border-slate-700"><option>5 kérdés</option><option>10 kérdés</option><option>20 kérdés</option></select>
                <button onclick="startQuiz()" class="bg-indigo-600 px-8 py-3 rounded-lg hover:bg-indigo-500">Indítás</button>
            </div>
            <div id="quiz-area" class="space-y-4"></div>
            <div id="timer" class="hidden text-center text-6xl mt-8">⏳</div>
        </div>
    </div>

    <script>
        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active-tab'));
            document.getElementById(tabId).classList.add('active-tab');
        }

        async function startQuiz() {
            const timer = document.getElementById('timer');
            timer.classList.remove('hidden');
            // Szimulált kvíz generálás
            setTimeout(() => {
                timer.classList.add('hidden');
                document.getElementById('quiz-area').innerHTML = "<div class='p-6 bg-slate-800 rounded-xl border border-slate-700'>A kvíz kérdéssora generálva a pécsi épületek szimbolikája alapján...</div>";
            }, 2000);
        }

        document.getElementById('search-box').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                const topic = e.target.value;
                const { Markmap } = window.markmap;
                const el = document.querySelector('#markmap');
                el.innerHTML = '';
                Markmap.create(el, null, "# " + topic + "\n## Szimbólumok\n## Építészeti vonatkozások\n## Történeti háttér");
            }
        });
    </script>
</body>
</html>
