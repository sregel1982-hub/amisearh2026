<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AMISEARCH - Gondolattérkép</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
<script src="https://cdn.jsdelivr.net/npm/markmap-lib@0.17.3/dist/browser/index.js"></script>
<script src="https://cdn.jsdelivr.net/npm/markmap-view@0.17.3/dist/browser/index.js"></script>
<style>
  body { font-family: 'Segoe UI', system-ui, -apple-system, BlinkMacSystemFont, sans-serif; }
  #loading { display: none; flex-direction: column; align-items: center; justify-content: center; min-height: 58vh; }
  #error { display: none; text-align: center; padding: 40px; }
  #result { display: none; }
  .btn-primary { background: linear-gradient(135deg, #6C5CE7 0%, #8B5CF6 100%); }
  .btn-primary:hover { opacity: 0.94; transform: translateY(-1px); }
  .mindmap-shell {
    background:
      radial-gradient(circle at top left, rgba(108,92,231,.14), transparent 28%),
      radial-gradient(circle at bottom right, rgba(16,185,129,.10), transparent 24%),
      #ffffff;
  }
  #mindmapSvg {
    width: 100%;
    height: min(74vh, 760px);
    min-height: 520px;
    display: block;
    background: transparent;
  }
  #mindmapSvg .markmap-node text {
    font-family: 'Segoe UI', system-ui, sans-serif;
    font-weight: 600;
  }
  #mindmapSvg .markmap-link {
    stroke-width: 2.2px;
    opacity: .72;
  }
  #markdownSource {
    tab-size: 2;
    line-height: 1.45;
  }
  @media (max-width: 720px) {
    #mindmapSvg { min-height: 460px; height: 65vh; }
  }
</style>
</head>
<body class="bg-gray-50 min-h-screen text-gray-900">

<header class="bg-white/95 backdrop-blur shadow-sm border-b border-gray-200 sticky top-0 z-40">
  <div class="max-w-7xl mx-auto px-4 py-3 flex items-center justify-between gap-4">
    <div class="flex items-center gap-3 min-w-0">
      <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-[#6C5CE7] to-[#8B5CF6] flex items-center justify-center text-white font-bold text-lg shadow-md">A</div>
      <h1 class="text-lg sm:text-xl font-bold text-gray-800 truncate">AMISEARCH <span class="text-[#6C5CE7] font-normal">Gondolattérkép</span></h1>
    </div>
    <a href="/" class="text-sm text-gray-500 hover:text-[#6C5CE7] transition flex items-center gap-2 shrink-0">
      <i class="fa-solid fa-arrow-left"></i> Vissza
    </a>
  </div>
</header>

<main class="max-w-7xl mx-auto px-4 py-8">

  <section id="inputSection" class="bg-white rounded-2xl shadow-lg p-6 mb-8 border border-purple-100">
    <div class="flex flex-col lg:flex-row lg:items-end gap-4">
      <div class="flex-1">
        <label class="block text-sm font-semibold text-gray-700 mb-2">
          <i class="fa-solid fa-brain text-[#6C5CE7] mr-2"></i>Miről készüljön gondolattérkép?
        </label>
        <input
          type="text"
          id="topicInput"
          placeholder="Pl.: Matematikai analízis, Világháború, Fotoszintézis..."
          class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-[#6C5CE7] focus:border-transparent outline-none text-gray-700"
          onkeypress="if(event.key==='Enter') generateMindmap()"
        >
      </div>
      <button
        onclick="generateMindmap()"
        id="genBtn"
        class="btn-primary text-white px-6 py-3 rounded-xl font-semibold transition flex items-center justify-center gap-2 shadow-lg"
      >
        <i class="fa-solid fa-wand-magic-sparkles"></i>
        <span>Generálás</span>
      </button>
    </div>
    <p class="text-xs text-gray-500 mt-3">
      <i class="fa-solid fa-circle-info mr-1 text-[#6C5CE7]"></i>
      Markmap-alapú, interaktív gondolattérkép: nagyítható, mozgatható, szerkeszthető Markdown forrással.
    </p>
  </section>

  <section id="loading">
    <div class="w-16 h-16 border-4 border-gray-200 border-t-[#6C5CE7] rounded-full animate-spin mb-4"></div>
    <p class="text-gray-600 font-semibold">Gondolattérkép generálása...</p>
    <p class="text-sm text-gray-400 mt-1">Ez 10-20 másodpercig is eltarthat.</p>
  </section>

  <section id="error" class="bg-red-50 rounded-2xl p-8 border border-red-100">
    <i class="fa-solid fa-circle-exclamation text-red-400 text-4xl mb-4"></i>
    <h3 class="text-lg font-bold text-red-700 mb-2">Hiba történt</h3>
    <p id="errorText" class="text-red-600 mb-4">Nem sikerült generálni a gondolattérképet.</p>
    <button onclick="resetForm()" class="px-4 py-2 bg-red-100 hover:bg-red-200 text-red-700 rounded-lg transition">
      <i class="fa-solid fa-rotate-left mr-1"></i> Újrapróbálás
    </button>
  </section>

  <section id="result">
    <div class="bg-white rounded-xl shadow-sm p-4 mb-4 flex flex-wrap items-center justify-between gap-3 border border-gray-100">
      <div class="flex items-center gap-2 min-w-0">
        <i class="fa-solid fa-sitemap text-[#6C5CE7]"></i>
        <span id="resultTitle" class="font-semibold text-gray-700 truncate"></span>
      </div>
      <div class="flex flex-wrap gap-2">
        <button onclick="fitMap()" class="px-4 py-2 bg-purple-50 hover:bg-purple-100 text-[#6C5CE7] rounded-lg text-sm transition flex items-center gap-2 font-semibold">
          <i class="fa-solid fa-compress"></i> Illesztés
        </button>
        <button onclick="downloadSVG()" class="px-4 py-2 bg-[#6C5CE7] hover:bg-[#5A4BD1] text-white rounded-lg text-sm transition flex items-center gap-2 font-semibold">
          <i class="fa-solid fa-download"></i> SVG
        </button>
        <button onclick="downloadPNG()" class="px-4 py-2 bg-gray-100 hover:bg-gray-200 text-gray-700 rounded-lg text-sm transition flex items-center gap-2 font-semibold">
          <i class="fa-solid fa-image"></i> PNG
        </button>
        <button onclick="resetForm()" class="px-4 py-2 bg-gray-100 hover:bg-gray-200 text-gray-700 rounded-lg text-sm transition flex items-center gap-2 font-semibold">
          <i class="fa-solid fa-plus"></i> Új térkép
        </button>
      </div>
    </div>

    <div class="mindmap-shell bg-white rounded-2xl shadow-lg p-3 sm:p-5 overflow-hidden border border-purple-100">
      <svg id="mindmapSvg"></svg>
    </div>

    <div class="mt-4 bg-white rounded-xl p-4 border border-gray-200 shadow-sm">
      <button onclick="toggleCode()" class="flex items-center gap-2 text-sm text-gray-700 hover:text-[#6C5CE7] transition font-semibold">
        <i id="codeChevron" class="fa-solid fa-chevron-right"></i>
        <span>Markdown forrás megtekintése és szerkesztése</span>
      </button>
      <div id="codeBlock" class="hidden mt-3">
        <textarea id="markdownSource" class="w-full h-56 p-3 font-mono text-xs bg-gray-900 text-green-300 rounded-lg resize-y" spellcheck="false"></textarea>
        <div class="flex flex-wrap gap-2 mt-3">
          <button onclick="renderFromTextarea()" class="px-3 py-2 bg-[#6C5CE7] text-white rounded-lg text-xs font-semibold">
            <i class="fa-solid fa-rotate mr-1"></i>Újrarenderelés
          </button>
          <button onclick="copyMarkdown()" class="px-3 py-2 bg-gray-100 text-gray-700 rounded-lg text-xs font-semibold hover:bg-gray-200">
            <i class="fa-regular fa-copy mr-1"></i>Markdown másolása
          </button>
        </div>
      </div>
    </div>
  </section>

</main>

<script>
let currentMarkdown = '';
let currentTopic = '';
let currentMap = null;

const urlParams = new URLSearchParams(window.location.search);
const topicFromUrl = urlParams.get('topic');
window.addEventListener('DOMContentLoaded', () => {
  document.getElementById('loading').style.display = 'none';
  if (topicFromUrl) {
    document.getElementById('topicInput').value = decodeURIComponent(topicFromUrl);
    generateMindmap();
  }
});

function escapeHtml(s) {
  return String(s || '').replace(/[&<>"]/g, ch => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[ch]));
}

function stripEmoji(text) {
  return String(text || '').replace(/[\u{1F300}-\u{1FAFF}\u{2600}-\u{27BF}\uFE0F]/gu, '').trim();
}

function cleanLabel(raw) {
  let s = stripEmoji(raw)
    .replace(/^[-*•]+\s*/, '')
    .replace(/^root\s*\(\(\s*/i, '')
    .replace(/^root\s*\(\s*/i, '')
    .replace(/^root\s*\[\s*/i, '')
    .replace(/[\]\)]\s*$/g, '')
    .replace(/^['"`]+|['"`]+$/g, '')
    .replace(/[{}\[\]<>|]/g, ' ')
    .replace(/\(\((.*?)\)\)/g, '$1')
    .replace(/"/g, '')
    .replace(/\s+/g, ' ')
    .trim();
  return s || 'Téma';
}

function mermaidMindmapToMarkdown(code, topic) {
  const raw = String(code || '')
    .replace(/^```(?:mermaid|mindmap)?\s*/i, '')
    .replace(/```\s*$/i, '')
    .replace(/\r/g, '')
    .trim();

  if (/^#\s+/m.test(raw) || /^-\s+/m.test(raw)) {
    return raw;
  }

  const lines = raw.split('\n').filter(line => line.trim());
  let title = cleanLabel(topic || currentTopic || 'Gondolattérkép');
  const items = [];

  for (const line of lines) {
    const trimmed = line.trim();
    if (!trimmed || /^mindmap\s*$/i.test(trimmed) || /^```/.test(trimmed)) continue;
    const leading = (line.match(/^\s*/) || [''])[0].length;
    const label = cleanLabel(trimmed);

    if (/^root\s*[\(\[]/i.test(trimmed)) {
      title = label || title;
      continue;
    }

    const depth = Math.max(0, Math.round(leading / 2) - 1);
    items.push('  '.repeat(depth) + '- ' + label);
  }

  if (!items.length) {
    items.push('- Fő fogalmak', '  - Meghatározás', '  - Példák', '- Kapcsolódó témák', '  - Ismétlés', '  - Gyakorlás');
  }

  return '# ' + title + '\n\n' + items.join('\n');
}

async function generateMindmap() {
  const topic = document.getElementById('topicInput').value.trim();
  if (!topic) {
    alert('Kérlek adj meg egy témát!');
    return;
  }

  currentTopic = topic;
  showLoading();

  try {
    const resp = await fetch('/.netlify/functions/generate-mindmap', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ topic, lang: 'hu', format: 'markdown' })
    });

    if (!resp.ok) throw new Error('Szerver hiba: ' + resp.status);
    const data = await resp.json();
    if (data.error) throw new Error(data.error);
    const source = data.markdown || data.code || data.text || '';
    if (!source) throw new Error('Üres válasz érkezett');

    currentMarkdown = mermaidMindmapToMarkdown(source, topic);
    await renderMarkmap(currentMarkdown);
    showResult(topic);
  } catch (e) {
    console.error('Generálási hiba:', e);
    showError(e.message || String(e));
  }
}

async function renderMarkmap(markdown) {
  const svg = document.getElementById('mindmapSvg');
  svg.innerHTML = '';
  currentMarkdown = markdown;
  document.getElementById('markdownSource').value = markdown;

  try {
    if (!window.markmap || !window.markmap.Transformer || !window.markmap.Markmap) {
      throw new Error('A Markmap könyvtár nem töltődött be.');
    }
    const transformer = new window.markmap.Transformer();
    const { root } = transformer.transform(markdown);
    currentMap = window.markmap.Markmap.create(svg, {
      duration: 450,
      maxWidth: 320,
      colorFreezeLevel: 2,
      initialExpandLevel: 3,
      spacingHorizontal: 88,
      spacingVertical: 14,
      paddingX: 12,
      autoFit: true
    }, root);
    setTimeout(fitMap, 250);
  } catch (e) {
    console.error('Markmap render hiba:', e);
    svg.innerHTML = '<foreignObject width="100%" height="100%"><div xmlns="http://www.w3.org/1999/xhtml" style="font-family:Segoe UI,sans-serif;padding:24px;color:#7f1d1d;background:#fef2f2;border-radius:16px;">Nem sikerült renderelni a Markmap térképet.<br><small>' + escapeHtml(e.message || e) + '</small></div></foreignObject>';
  }
}

function fitMap() {
  try {
    if (currentMap && typeof currentMap.fit === 'function') currentMap.fit();
  } catch (_) {}
}

async function renderFromTextarea() {
  const markdown = document.getElementById('markdownSource').value;
  await renderMarkmap(markdown);
}

function showLoading() {
  document.getElementById('inputSection').style.display = 'none';
  document.getElementById('loading').style.display = 'flex';
  document.getElementById('error').style.display = 'none';
  document.getElementById('result').style.display = 'none';
}

function showError(msg) {
  document.getElementById('loading').style.display = 'none';
  document.getElementById('error').style.display = 'block';
  document.getElementById('errorText').textContent = msg;
}

function showResult(topic) {
  document.getElementById('loading').style.display = 'none';
  document.getElementById('result').style.display = 'block';
  document.getElementById('resultTitle').textContent = topic;
}

function resetForm() {
  document.getElementById('inputSection').style.display = 'block';
  document.getElementById('loading').style.display = 'none';
  document.getElementById('error').style.display = 'none';
  document.getElementById('result').style.display = 'none';
  document.getElementById('topicInput').value = '';
  document.getElementById('topicInput').focus();
}

function toggleCode() {
  const block = document.getElementById('codeBlock');
  const chev = document.getElementById('codeChevron');
  block.classList.toggle('hidden');
  chev.className = block.classList.contains('hidden') ? 'fa-solid fa-chevron-right' : 'fa-solid fa-chevron-down';
}

async function copyMarkdown() {
  try {
    await navigator.clipboard.writeText(document.getElementById('markdownSource').value || currentMarkdown || '');
    alert('Markdown forrás másolva.');
  } catch (_) {
    alert('Nem sikerült másolni.');
  }
}

function safeFilename(name) {
  return String(name || 'gondolatterkep')
    .normalize('NFD')
    .replace(/[\u0300-\u036f]/g, '')
    .replace(/[^a-zA-Z0-9_-]+/g, '_')
    .replace(/^_+|_+$/g, '')
    .slice(0, 70) || 'gondolatterkep';
}

function downloadSVG() {
  const svg = document.querySelector('#mindmapSvg');
  if (!svg || !svg.innerHTML.trim()) {
    alert('Először generáld le a gondolattérképet!');
    return;
  }
  const clone = svg.cloneNode(true);
  clone.setAttribute('xmlns', 'http://www.w3.org/2000/svg');
  clone.setAttribute('width', svg.clientWidth || 1400);
  clone.setAttribute('height', svg.clientHeight || 900);
  const svgData = new XMLSerializer().serializeToString(clone);
  const blob = new Blob([svgData], { type: 'image/svg+xml;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = safeFilename('gondolatterkep_' + currentTopic) + '.svg';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function downloadPNG() {
  const svg = document.querySelector('#mindmapSvg');
  if (!svg || !svg.innerHTML.trim()) {
    alert('Először generáld le a gondolattérképet!');
    return;
  }
  const clone = svg.cloneNode(true);
  const width = Math.max(svg.clientWidth || 1400, 1200);
  const height = Math.max(svg.clientHeight || 900, 800);
  clone.setAttribute('xmlns', 'http://www.w3.org/2000/svg');
  clone.setAttribute('width', width);
  clone.setAttribute('height', height);
  const svgData = new XMLSerializer().serializeToString(clone);
  const svgBlob = new Blob([svgData], { type: 'image/svg+xml;charset=utf-8' });
  const url = URL.createObjectURL(svgBlob);
  const img = new Image();
  img.onload = function () {
    const canvas = document.createElement('canvas');
    const scale = 2;
    canvas.width = width * scale;
    canvas.height = height * scale;
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
    const pngUrl = canvas.toDataURL('image/png');
    const a = document.createElement('a');
    a.href = pngUrl;
    a.download = safeFilename('gondolatterkep_' + currentTopic) + '.png';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  };
  img.onerror = function () {
    URL.revokeObjectURL(url);
    alert('PNG export hiba. Próbáld az SVG letöltést.');
  };
  img.src = url;
}
</script>

</body>
</html>
