<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gondolattérkép / Mindmap</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/markmap-toolbar@0.17.0/dist/style.min.css">
    <script src="https://cdn.jsdelivr.net/npm/markmap-autoloader@0.17.0"></script>
    <style>
        body { margin: 0; width: 100vw; height: 100vh; overflow: hidden; background: #0f172a; color: white; }
        #toolbar { position: absolute; bottom: 20px; left: 20px; z-index: 10; }
        svg { width: 100%; height: 100%; }
    </style>
</head>
<body>
    <div id="toolbar">
        <button id="download-svg" style="background:#6366f1; color:white; border:none; padding:8px 15px; border-radius:5px; cursor:pointer;">SVG Letöltés</button>
    </div>
    <svg id="markmap"></svg>

    <script>
        let currentMarkdown = "";
        const lang = new URLSearchParams(window.location.search).get('lang') || 'hu';

        window.addEventListener('message', (event) => {
            if (event.data.type === 'render-markmap') {
                currentMarkdown = event.data.markdown;
                const { Markmap } = window.markmap;
                const el = document.querySelector('#markmap');
                el.innerHTML = '';
                Markmap.create(el, null, currentMarkdown);
            }
        });

        // SVG letöltés logikája
        document.getElementById('download-svg').addEventListener('click', () => {
            const svgData = document.querySelector('svg').outerHTML;
            const blob = new Blob([svgData], {type: 'image/svg+xml'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `gondolatterkep_${lang}.svg`;
            a.click();
        });
    </script>
</body>
</html>
