<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AMISEARCH - Gondolattérkép</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
<style>
  body { font-family: 'Segoe UI', system-ui, sans-serif; }
  .mermaid { background: #fff; border-radius: 12px; padding: 20px; }
  .mermaid svg { max-width: 100%; height: auto; }
  #loading { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 60vh; }
  #error { display: none; text-align: center; padding: 40px; }
  #result { display: none; }
  .btn-primary { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
  .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }
</style>
</head>
<body class="bg-gray-50 min-h-screen">

<!-- Header -->
<header class="bg-white shadow-sm border-b border-gray-200 sticky top-0 z-40">
  <div class="max-w-6xl mx-auto px-4 py-3 flex items-center justify-between">
    <div class="flex items-center gap-3">
      <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-[#6C5CE7] to-[#8B5CF6] flex items-center justify-center text-white font-bold text-lg">A</div>
      <h1 class="text-xl font-bold text-gray-800">AMISEARCH <span class="text-[#6C5CE7] font-normal">Gondolattérkép</span></h1>
    </div>
    <a href="/" class="text-sm text-gray-500 hover:text-[#6C5CE7] transition flex items-center gap-2">
      <i class="fa-solid fa-arrow-left"></i> Vissza az oldalra
    </a>
  </div>
</header>

<main class="max-w-6xl mx-auto px-4 py-8">

  <!-- Input szekció -->
  <div id="inputSection" class="bg-white rounded-2xl shadow-lg p-6 mb-8">
    <label class="block text-sm font-medium text-gray-700 mb-2">
      <i class="fa-solid fa-brain text-[#6C5CE7] mr-2"></i>Miről készüljön gondolattérkép?
    </label>
    <div class="flex gap-3">
      <input 
        type="text" 
        id="topicInput" 
        placeholder="Pl.: Matematikai analízis, Világháború, Fotoszintézis..." 
        class="flex-1 px-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-[#6C5CE7] focus:border-transparent outline-none text-gray-700"
        onkeypress="if(event.key==='Enter') generateMindmap()"
      >
      <button 
        onclick="generateMindmap()" 
        id="genBtn"
        class="btn-primary text-white px-6 py-3 rounded-xl font-medium transition flex items-center gap-2 shadow-lg"
      >
        <i class="fa-solid fa-wand-magic-sparkles"></i>
        <span>Generálás</span>
      </button>
    </div>
    <p class="text-xs text-gray-400 mt-2">
      <i class="fa-solid fa-circle-info mr-1"></i>
      Az AI automatikusan felépíti a témakör struktúráját és kapcsolatait.
    </p>
  </div>

  <!-- Betöltés -->
  <div id="loading">
    <div class="w-16 h-16 border-4 border-gray-200 border-t-[#6C5CE7] rounded-full animate-spin mb-4"></div>
    <p class="text-gray-500 font-medium">Gondolattérkép generálása...</p>
    <p class="text-sm text-gray-400 mt-1">Ez 10-20 másodpercig is eltarthat</p>
  </div>

  <!-- Hiba -->
  <div id="error" class="bg-red-50 rounded-2xl p-8">
    <i class="fa-solid fa-circle-exclamation text-red-400 text-4xl mb-4"></i>
    <h3 class="text-lg font-bold text-red-700 mb-2">Hiba történt</h3>
    <p id="errorText" class="text-red-600 mb-4">Nem sikerült generálni a gondolattérképet.</p>
    <button onclick="resetForm()" class="px-4 py-2 bg-red-100 hover:bg-red-200 text-red-700 rounded-lg transition">
      <i class="fa-solid fa-rotate-left mr-1"></i> Újrapróbálás
    </button>
  </div>

  <!-- Eredmény -->
  <div id="result">
    <!-- Toolbar -->
    <div class="bg-white rounded-xl shadow-sm p-4 mb-4 flex flex-wrap items-center justify-between gap-3">
      <div class="flex items-center gap-2">
        <i class="fa-solid fa-sitemap text-[#6C5CE7]"></i>
        <span id="resultTitle" class="font-medium text-gray-700"></span>
      </div>
      <div class="flex gap-2">
        <button onclick="downloadSVG()" class="px-4 py-2 bg-[#6C5CE7] hover:bg-[#5A4BD1] text-white rounded-lg text-sm transition flex items-center gap-2">
          <i class="fa-solid fa-download"></i> SVG letöltés
        </button>
        <button onclick="downloadPNG()" class="px-4 py-2 bg-gray-100 hover:bg-gray-200 text-gray-700 rounded-lg text-sm transition flex items-center gap-2">
          <i class="fa-solid fa-image"></i> PNG letöltés
        </button>
        <button onclick="resetForm()" class="px-4 py-2 bg-gray-100 hover:bg-gray-200 text-gray-700 rounded-lg text-sm transition flex items-center gap-2">
          <i class="fa-solid fa-plus"></i> Új térkép
        </button>
      </div>
    </div>

    <!-- Gondolattérkép container -->
    <div class="bg-white rounded-2xl shadow-lg p-6 overflow-x-auto">
      <div id="mindmapContainer" class="mermaid flex justify-center min-h-[400px]">
        <!-- Ide jön a Mermaid kód -->
      </div>
    </div>

    <!-- Mermaid szöveges változat (összecsukható) -->
    <div class="mt-4 bg-gray-100 rounded-xl p-4">
      <button onclick="toggleCode()" class="flex items-center gap-2 text-sm text-gray-600 hover:text-gray-800 transition">
        <i id="codeChevron" class="fa-solid fa-chevron-right"></i>
        <span>Mermaid kód megtekintése (szerkeszthető)</span>
      </button>
      <div id="codeBlock" class="hidden mt-3">
        <textarea id="mermaidCode" class="w-full h-48 p-3 font-mono text-xs bg-gray-800 text-green-400 rounded-lg resize-y" onchange="renderFromTextarea()"></textarea>
        <button onclick="renderFromTextarea()" class="mt-2 px-3 py-1 bg-[#6C5CE7] text-white rounded text-xs">
          <i class="fa-solid fa-rotate mr-1"></i>Újrarenderelés
        </button>
      </div>
    </div>
  </div>

</main>

<script>
// Inicializálás
mermaid.initialize({ 
  startOnLoad: false,
  theme: 'default',
  mindmap: { useMaxWidth: true }
});

let currentCode = '';
let currentTopic = '';

// URL paraméter ellenőrzése (ha az AI tutor küldött témát)
const urlParams = new URLSearchParams(window.location.search);
const topicFromUrl = urlParams.get('topic');
if (topicFromUrl) {
  document.getElementById('topicInput').value = decodeURIComponent(topicFromUrl);
  generateMindmap();
}

async function generateMindmap() {
  const topic = document.getElementById('topicInput').value.trim();
  if (!topic) {
    alert('Kérlek adj meg egy témát!');
    return;
  }

  currentTopic = topic;
  showLoading();

  try {
    const resp = await fetch('/.netlify/functions/generate-mindmap', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ topic, lang: 'hu' })
    });

    if (!resp.ok) throw new Error('Szerver hiba: ' + resp.status);
    
    const data = await resp.json();
    if (data.error) throw new Error(data.error);
    if (!data.code) throw new Error('Üres válasz érkezett');

    currentCode = data.code;
    await renderMindmap(currentCode);
    showResult(topic);

  } catch (e) {
    console.error('Generálási hiba:', e);
    showError(e.message);
  }
}

async function renderMindmap(code) {
  const container = document.getElementById('mindmapContainer');
  
  let cleanCode = code
    .replace(/^```mermaid\n?/, '')
    .replace(/```$/, '')
    .trim();
  
  if (!cleanCode.startsWith('mindmap')) {
    cleanCode = 'mindmap\n' + cleanCode;
  }

  container.innerHTML = '<div class="mermaid-inner">\n' + cleanCode + '\n</div>';
  document.getElementById('mermaidCode').value = cleanCode;

  try {
    await mermaid.run({
      querySelector: '#mindmapContainer .mermaid-inner'
    });
  } catch (e) {
    console.error('Mermaid render hiba:', e);
    container.innerHTML = '<pre class="text-red-500 p-4">Hiba a renderelésnél:\n' + e.message + '\n\nKód:\n' + cleanCode.replace(/</g, '&lt;') + '</pre>';
  }
}

async function renderFromTextarea() {
  const code = document.getElementById('mermaidCode').value;
  currentCode = code;
  await renderMindmap(code);
}

function showLoading() {
  document.getElementById('inputSection').style.display = 'none';
  document.getElementById('loading').style.display = 'flex';
  document.getElementById('error').style.display = 'none';
  document.getElementById('result').style.display = 'none';
}

function showError(msg) {
  document.getElementById('loading').style.display = 'none';
  document.getElementById('error').style.display = 'block';
  document.getElementById('errorText').textContent = msg;
}

function showResult(topic) {
  document.getElementById('loading').style.display = 'none';
  document.getElementById('result').style.display = 'block';
  document.getElementById('resultTitle').textContent = topic;
}

function resetForm() {
  document.getElementById('inputSection').style.display = 'block';
  document.getElementById('loading').style.display = 'none';
  document.getElementById('error').style.display = 'none';
  document.getElementById('result').style.display = 'none';
  document.getElementById('topicInput').value = '';
  document.getElementById('topicInput').focus();
}

function toggleCode() {
  const block = document.getElementById('codeBlock');
  const chev = document.getElementById('codeChevron');
  block.classList.toggle('hidden');
  chev.className = block.classList.contains('hidden') ? 'fa-solid fa-chevron-right' : 'fa-solid fa-chevron-down';
}

function downloadSVG() {
  const svg = document.querySelector('#mindmapContainer svg');
  if (!svg) {
    alert('Először generáld le a gondolattérképet!');
    return;
  }
  
  const svgData = new XMLSerializer().serializeToString(svg);
  const blob = new Blob([svgData], { type: 'image/svg+xml;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  
  const a = document.createElement('a');
  a.href = url;
  a.download = 'gondolatterkep_' + currentTopic.replace(/\s+/g, '_').replace(/[^a-zA-Z0-9_-]/g, '') + '.svg';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function downloadPNG() {
  const svg = document.querySelector('#mindmapContainer svg');
  if (!svg) {
    alert('Először generáld le a gondolattérképet!');
    return;
  }

  const svgData = new XMLSerializer().serializeToString(svg);
  const canvas = document.createElement('canvas');
  const ctx = canvas.getContext('2d');
  const img = new Image();
  
  const svgBlob = new Blob([svgData], {type: 'image/svg+xml;charset=utf-8'});
  const url = URL.createObjectURL(svgBlob);
  
  img.onload = function() {
    canvas.width = img.width * 2;
    canvas.height = img.height * 2;
    ctx.fillStyle = 'white';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
    
    const pngUrl = canvas.toDataURL('image/png');
    const a = document.createElement('a');
    a.href = pngUrl;
    a.download = 'gondolatterkep_' + currentTopic.replace(/\s+/g, '_').replace(/[^a-zA-Z0-9_-]/g, '') + '.png';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  };
  
  img.src = url;
}
</script>

</body>
</html>
