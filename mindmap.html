<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AMISEARCH Multitool</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/markmap-toolbar@0.17.0/dist/style.min.css">
    <script src="https://cdn.jsdelivr.net/npm/markmap-autoloader@0.17.0"></script>
    <style>
        :root { --primary: #6366f1; }
        body { background-color: #f9fafb; font-family: 'Segoe UI', sans-serif; }
        .nav-card { transition: all 0.3s ease; border: 1px solid #e5e7eb; cursor: pointer; }
        .nav-card:hover { border-color: var(--primary); transform: translateY(-2px); box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
    </style>
</head>
<body class="p-6">

    <div class="max-w-6xl mx-auto">
        <div class="flex justify-between items-center mb-8">
            <h1 class="text-3xl font-bold text-gray-800">AMISEARCH <span class="text-indigo-600 font-light">Multitool</span></h1>
            <div class="flex gap-4">
                <select id="lang-selector" onchange="changeLanguage()" class="p-2 border rounded-md">
                    <option value="hu">Magyar</option>
                    <option value="en">English</option>
                </select>
                <button onclick="history.back()" class="bg-gray-200 px-4 py-2 rounded-md hover:bg-gray-300">Vissza</button>
            </div>
        </div>

        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
            <button onclick="switchTab('func')" class="nav-card p-4 rounded-xl bg-white text-center">Függvényábrázoló</button>
            <button onclick="switchTab('mind')" class="nav-card p-4 rounded-xl bg-white text-center">Gondolattérkép</button>
            <button onclick="switchTab('stat')" class="nav-card p-4 rounded-xl bg-white text-center">Statisztika</button>
            <button onclick="switchTab('quiz')" class="nav-card p-4 rounded-xl bg-white text-center">AI Kvízgenerátor</button>
        </div>

        <div id="content-area" class="bg-white p-8 rounded-2xl shadow-sm border border-gray-100">
            <div id="tab-func" class="tab-section">
                <h2 class="text-xl font-bold mb-4">Függvény Beállítások</h2>
                <input type="text" id="math-input" placeholder="Matematikai képlet (pl. Math.sin(x))" class="w-full p-3 border rounded-lg mb-4">
                <button class="bg-indigo-600 text-white px-6 py-2 rounded-lg">Ábrázolás frissítése</button>
            </div>

            <div id="tab-mind" class="tab-section hidden">
                <h2 class="text-xl font-bold mb-4">Gondolattérkép Generálás</h2>
                <textarea id="mind-input" class="w-full h-32 p-3 border rounded-lg mb-4" placeholder="Írd be a témát vagy vázlatot..."></textarea>
                <button onclick="renderMindmap()" class="bg-indigo-600 text-white px-6 py-2 rounded-lg">Generálás</button>
                <div id="markmap-container" class="mt-6 h-64 border rounded">
                    <svg id="markmap"></svg>
                </div>
            </div>

            <div id="tab-stat" class="tab-section hidden">
                <h2 class="text-xl font-bold mb-4">Statisztika</h2>
                <p>Statisztikai adatok megjelenítése.</p>
            </div>

            <div id="tab-quiz" class="tab-section hidden">
                <h2 class="text-xl font-bold mb-4">AI Kvízgenerátor</h2>
                <p>Kvíz konfiguráció és kérdések.</p>
            </div>
        </div>
    </div>

    <script>
        const apiKey = "TITKOS_KULCS_HELYE";

        function switchTab(tabId) {
            document.querySelectorAll('.tab-section').forEach(el => el.classList.add('hidden'));
            const target = document.getElementById('tab-' + tabId);
            if (target) {
                target.classList.remove('hidden');
            }
        }

        function renderMindmap() {
            const input = document.getElementById('mind-input').value;
            const el = document.querySelector('#markmap');
            if (window.markmap && el) {
                el.innerHTML = '';
                window.markmap.Markmap.create(el, null, input || "# Téma\n- Alpont 1\n- Alpont 2");
            }
        }

        function changeLanguage() {
            const lang = document.getElementById('lang-selector').value;
            alert("Nyelv váltva erre: " + lang);
        }
    </script>
</body>
</html>
